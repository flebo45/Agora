<body>

  <div class="container">
    <div class="box">
      <form>
        <div>

          <label>
            <input type="text" class="input-description" required>
          </label>
        </div>
        <div>
          <h3 class="tex-bold">Description</h3>
          <label>
          </label>
        </div>

          <input type="image" class="input-image" placeholder="Image" required alt="">

          <button type="submit" class="submit-btn" onclick="location.href='index.html'"></button>
        </label>

  </div>

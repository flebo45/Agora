<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-compatible" content ="IE=edge">
  <meta name="viewport" content="width-device-width, initial-scale-1.0">
  <title> Agora home-page</title>
  <!-- icon scout cdn -->
  <link rel="stylesheet" href="https://unicons.iconscout.com/release/v2.1.6/css/unicons.css">
  <link rel="icon" href="Img/A.png">

  <!-- stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="box">
    <div class="form-box">
      <div class="button-box">
        <div id="btn-log"> </div>
          <button type="button" class="toggle-btn" onclick="login()">Log In</button>
          <button type="button" class="toggle-btn" onclick="register()">Register</button>
      </div>
      <div class="tex-bold">
        <h3>Agora'</h3>
      </div>
      <!------------FROM PER IL LOG IN------------------------------>
      <form id="login" class="input-group">
        <label>
          <input type="text" class="input-field" placeholder="User ID" required>
        </label>
        <label>
          <input type="password" class="input-field" placeholder="Enter Password" required>
        </label>
        <button type="submit" class="submit-btn" onclick="location.href='index.html'">Log in</button>
      </form>
      <!------------FINE FROM PER IL LOG IN------------------------------>

      <!------------FROM PER IL SING UP------------------------------>
      <form id="register" class="input-group">
        <label>
          <input type="text" class="input-field" placeholder="Full Name" required>
        </label>
        <label>
          <input type="text" class="input-field" placeholder="User ID" required>
        </label>
        <label>
          <input type="email" class="input-field" placeholder="Email" required>
        </label>
        <label>
          <input type="tel" class="input-field" placeholder="Phone" required>
        </label>
        <label>
          <input type="password" class="input-field" placeholder="Enter Password" required>
        </label>
        <button type="submit" class="submit-btn" onclick="location.href='index.html'">Register</button>
      </form>
      <!------------FINE FROM PER IL SING UP------------------------------>
    </div>

  </div>

<script> const x = document.getElementById("login");
const y = document.getElementById("register");
const z = document.getElementById("btn-log");

function register(){
  x.style.left = "-400px"
  y.style.left = "50px"
  z.style.left = "110px"
}

function login(){
  x.style.left = "50px"
  y.style.left = "550px"
  z.style.left = "0px"
}

</script>

</body>
</html>

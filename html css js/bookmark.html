<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-compatible" content ="IE=edge">
  <meta name="viewport" content="width-device-width, initial-scale-1.0">
  <title> Agora home-page</title>
  <!-- icon scout cdn -->
  <link rel="stylesheet" href="https://unicons.iconscout.com/release/v2.1.6/css/unicons.css">
  <link rel="icon" href="Img/A.png">

  <!-- stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>


<nav>
  <div class="container">
    <h2 class="log">
      Agora
    </h2>
    <div class="search-bar">
      <i class ="uil uil-search"></i>
      <label>
        <input type ="search" placeholder="search for post or users">
      </label>
    </div>
    <div class="profile-photo">
      <img src="Img/A.png" alt="">
    </div>
  </div>
</nav>
<main>
  <div class="container">
    <!-----------------------left-------------------->
    <div class="left">
      <a class="profile">
        <div class="profile-photo">
          <img src="Img/A.png" alt="log in">
        </div>
        <div class ="handle">
          <h4> Agora </h4>
          <p class="text-muted">
            @Agora
          </p>
        </div>
      </a>
      <!-----------------------SIDE BAR-------------------->
      <div class="sidebar">
        <a class="menu-items">
          <button class="btn-transparent" onclick="location.href='index.html'"> <i class="uil uil-home"></i></button> <h3>Home</h3>
        </a>
        <a class="menu-items ">
          <button class="btn-transparent" onclick="location.href='explore.html'"> <i class="uil uil-compass"></i></button> <h3> Explore</h3>
        </a>
        <a class="menu-items" id="notification">
          <span> <i class="uil uil-bell"><small class="notification-count">1</small></i></span> <h3> Notification</h3>
          <!----------------NOTIFICATION POPUP------------------------>
          <div class="notification-popup">
            <div>
              <div class="profile-photo">
                <img src="Img/A.png" alt="photo">
              </div>
              <div class="notification-body">
                <b> user name for notification</b> <-Action made by him
                <small class="text-muted"> time</small>
              </div>
            </div>
          </div>
        </a>
        <!------------------------END OF NOTIFICATION POP UP------------------->
        <a class="menu-items active">
          <span> <i class="uil uil-bookmark"></i></span> <h3> Bookmark</h3>
        </a>
        <a class="menu-items ">
          <button class="btn-transparent" onclick="location.href='profile.html'"><i class="uil uil-user-circle"></i></button> <h3>Profile</h3>
        </a>
        <a class="menu-items " id="theme">
          <span> <i class="uil uil-palette"></i></span> <h3> Theme</h3>
        </a>
        <a class="menu-items " >
          <span> <i class="uil uil-setting"></i></span> <h3> Setting</h3>
        </a>
      </div>
      <!--------------------END OF SIDE BAR----------------->
      <label
              class="btn btn-primary">create post
        <button class="btn-transparent" onclick="location.href='creation-post.html'"></button>
      </label>
    </div>


    <!-----------------------END OF LEFT-------------------->

  </div>
</main>
</body>
</html>
